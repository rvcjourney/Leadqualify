<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Qualification Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            margin-bottom: 24px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 150px;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            padding: 12px 20px;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .result-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.qualified {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-badge.not-qualified {
            background: #ffebee;
            color: #c62828;
        }

        .status-badge.potential {
            background: #fff3e0;
            color: #e65100;
        }

        .status-icon {
            font-size: 20px;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .score-circle {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }

        .score-circle svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .score-circle-background {
            fill: none;
            stroke: #f0f0f0;
            stroke-width: 12;
        }

        .score-circle-progress {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .score-circle.high .score-circle-progress {
            stroke: #4caf50;
        }

        .score-circle.medium .score-circle-progress {
            stroke: #ff9800;
        }

        .score-circle.low .score-circle-progress {
            stroke: #f44336;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        .score-number {
            font-size: 56px;
            font-weight: 700;
            color: #333;
        }

        .score-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .score-title {
            font-size: 16px;
            color: #666;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .info-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0d5ff;
        }

        .info-label {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .reason-section {
            background: #f9f9f9;
            padding: 24px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .reason-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .reason-text {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .error-message {
            display: none;
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px;
            }

            .header h1 {
                font-size: 28px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-analyze, .btn-clear {
                width: 100%;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .score-circle {
                width: 150px;
                height: 150px;
            }

            .score-number {
                font-size: 42px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lead Qualification Agent</h1>
            <p>Analyze customer inquiries and determine lead quality instantly</p>
        </div>

        <div class="card">
            <div class="input-section">
                <label class="input-label">Customer Inquiry</label>
                <textarea id="inquiry" placeholder="Enter the customer inquiry here..."></textarea>
                <div class="button-group">
                    <button class="btn-clear" onclick="clearInput()">Clear</button>
                    <button class="btn-analyze" id="analyzeBtn" onclick="analyzeInquiry()">Analyze</button>
                </div>
            </div>

            <div class="error-message" id="errorMsg"></div>
            <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
                <div class="loading-text">Analyzing inquiry...</div>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <div>
                        <h2 style="margin-bottom: 10px; color: #333;">Qualification Result</h2>
                        <span class="status-badge" id="statusBadge">
                            <span class="status-icon">⊙</span>
                            <span id="statusText">Analyzing...</span>
                        </span>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">Confidence Level</div>
                        <div class="info-value" id="confidenceValue">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Matched Product</div>
                        <div class="info-value" id="productValue">-</div>
                    </div>
                </div>

                <div class="score-box">
                    <div class="score-circle" id="scoreCircle">
                        <svg viewBox="0 0 200 200">
                            <circle class="score-circle-background" cx="100" cy="100" r="90"></circle>
                            <circle class="score-circle-progress" id="scoreProgress" cx="100" cy="100" r="90"></circle>
                        </svg>
                        <div class="score-text">
                            <div class="score-number" id="scoreNumber">-</div>
                            <div class="score-label">Score</div>
                        </div>
                    </div>
                    <div class="score-title">Lead Quality Score</div>
                </div>

                <div class="reason-section">
                    <div class="reason-title">Analysis</div>
                    <div class="reason-text" id="reasonText">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeInquiry() {
            const inquiry = document.getElementById('inquiry').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loadingSpinner');
            const resultSection = document.getElementById('resultSection');

            // Validate input
            if (!inquiry) {
                errorMsg.textContent = '⚠ Please enter a customer inquiry before analyzing.';
                errorMsg.classList.add('show');
                return;
            }

            errorMsg.classList.remove('show');
            loading.classList.add('show');
            resultSection.classList.remove('show');
            analyzeBtn.disabled = true;

            try {
                const response = await fetch('https://n8n.b2botix.ai/webhook/Lead-Qalification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: inquiry })
                });

                if (!response.ok) {
                    throw new Error('Server error. Please try again.');
                }

                const data = await response.json();
                const result = Array.isArray(data) ? data[0] : data;

                if (!result) {
                    throw new Error('No response from server.');
                }

                displayResult(result);
            } catch (error) {
                errorMsg.textContent = '❌ ' + (error.message || 'Unable to analyze inquiry. Please check your connection.');
                errorMsg.classList.add('show');
            } finally {
                analyzeBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function displayResult(result) {
            const score = Math.max(0, Math.min(100, Number(result.Score) || 0));
            const lead = (result.Lead || '').toLowerCase();
            const reason = result.Reason || 'No analysis available.';
            const confidence = result.Confidence || '-';
            const product = result.Matched_Product || '-';

            // Update status badge based on score ranges
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');

            if (score >= 70) {
                statusBadge.className = 'status-badge qualified';
                statusText.textContent = '✓ Qualified';
            } else if (score >= 40) {
                statusBadge.className = 'status-badge potential';
                statusText.textContent = '⊙ Potential Lead';
            } else {
                statusBadge.className = 'status-badge not-qualified';
                statusText.textContent = '✗ Not Qualified';
            }

            // Update score circle
            const scoreNumber = document.getElementById('scoreNumber');
            const scoreCircle = document.getElementById('scoreCircle');
            const scoreProgress = document.getElementById('scoreProgress');

            scoreNumber.textContent = score;

            // Set circle class based on qualification score ranges
            scoreCircle.className = 'score-circle';
            if (score >= 70) {
                scoreCircle.classList.add('high');  // Qualified
            } else if (score >= 40) {
                scoreCircle.classList.add('medium'); // Potential Lead
            } else {
                scoreCircle.classList.add('low');    // Not Qualified
            }

            // Animate progress circle
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (score / 100) * circumference;
            scoreProgress.style.strokeDasharray = circumference;
            scoreProgress.style.strokeDashoffset = offset;

            // Update info cards
            document.getElementById('confidenceValue').textContent = confidence;
            document.getElementById('productValue').textContent = product;

            // Update reason text
            document.getElementById('reasonText').textContent = reason;

            // Show result section
            document.getElementById('resultSection').classList.add('show');
        }

        function clearInput() {
            document.getElementById('inquiry').value = '';
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('inquiry').focus();
        }

        // Allow Enter+Ctrl to submit
        document.getElementById('inquiry').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key === 'Enter') {
                analyzeInquiry();
            }
        });
    </script>
</body>
</html>
